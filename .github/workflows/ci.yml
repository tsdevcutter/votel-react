name: React CI/CD Pipeline

# This defines when the automation runs
on:
  push:
    branches: [ "feature/*", "develop" ] # Run tests on every feature push
  pull_request:
    branches: [ "main" ] # Run tests when trying to merge into main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js (matches the version you use locally)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to the current standard
          cache: 'npm'

      # 3. Clean install of dependencies (ignores local lockfile drifts)
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # 4. Run your test suite
      # NOTE: --watchAll=false is critical so the process finishes and returns a result
      - name: Run Tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      # 5. Verify the build process works
      # If your React code has syntax errors or broken imports, this will fail
      - name: Build Project
        run: npm run build